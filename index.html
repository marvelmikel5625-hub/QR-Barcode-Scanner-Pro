<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>QR & Barcode Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.1/umd/index.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 0.5rem;
        }
        .scanner-card {
            max-width: 780px;
            width: 100%;
            background: #141c26;
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }
        .header h1 {
            font-weight: 500;
            font-size: 1.5rem;
            color: #eaf1fc;
        }
        .header h1 span {
            background: #263544;
            font-size: 0.65rem;
            padding: 0.15rem 0.8rem;
            border-radius: 40px;
            color: #9bb9df;
        }
        .btn-icon {
            background: #1e2a3a;
            border: none;
            color: #c5d9f5;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            border: 1px solid #31425a;
        }
        .btn-icon.flash-on {
            background: #f5c542;
            color: #1a1f2a;
        }
        .video-wrapper {
            position: relative;
            background: #060a10;
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid #263344;
        }
        #video {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            background: #060a10;
        }
        .scan-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scan-frame {
            width: 72%;
            height: 72%;
            border: 2px solid rgba(80, 190, 255, 0.45);
            border-radius: 28px;
            position: relative;
        }
        .scan-frame::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 24px;
            height: 24px;
            border-top: 4px solid #78c2ff;
            border-left: 4px solid #78c2ff;
            border-radius: 8px 0 0 0;
        }
        .scan-frame::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 24px;
            height: 24px;
            border-bottom: 4px solid #78c2ff;
            border-right: 4px solid #78c2ff;
            border-radius: 0 0 8px 0;
        }
        .scan-line {
            position: absolute;
            left: 10%;
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #7ac8ff, transparent);
            box-shadow: 0 0 20px #7ac8ff88;
            animation: scanMove 2.4s ease-in-out infinite;
            border-radius: 4px;
        }
        @keyframes scanMove {
            0% { top: 12%; opacity: 0.3; }
            50% { top: 78%; opacity: 1; }
            100% { top: 12%; opacity: 0.3; }
        }
        .status-bar {
            margin-top: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.7rem;
            background: #101a26;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            border: 1px solid #26364a;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #b8cee7;
        }
        .status-dot {
            width: 11px;
            height: 11px;
            border-radius: 11px;
            background: #3f536a;
            transition: background 0.25s;
        }
        .status-dot.active {
            background: #2ecc71;
            box-shadow: 0 0 16px #2ecc71aa;
        }
        .status-dot.error {
            background: #e74c3c;
            box-shadow: 0 0 16px #e74c3caa;
        }
        #result-output {
            background: #0b121d;
            color: #d3e3ff;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-size: 0.85rem;
            border: 1px solid #2a3b52;
            flex: 1;
            min-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: monospace;
        }
        #result-output.highlight {
            border-color: #2ecc71;
            box-shadow: 0 0 20px #2ecc7140;
        }
        .action-group {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-top: 0.9rem;
        }
        .btn {
            background: #1f2d40;
            border: none;
            color: #deecff;
            font-weight: 500;
            padding: 0.6rem 1.3rem;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid #354a63;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #1f6eff;
            border-color: #4a8aff;
            color: #fff;
            box-shadow: 0 4px 16px #1f6eff50;
        }
        .btn-primary:hover {
            background: #3a7eff;
        }
        .btn-secondary {
            background: #182332;
            border-color: #2e405a;
        }
        .btn-secondary:hover {
            background: #23344a;
        }
        .btn-success {
            background: #1f8b4c;
            border-color: #2eaa5e;
            color: #fff;
        }
        .btn-success:hover {
            background: #279e57;
        }
        .bottom-sheet {
            margin-top: 1.2rem;
            background: #0f1824;
            border-radius: 1.8rem;
            padding: 0.9rem 1.2rem;
            border: 1px solid #26384e;
            display: none;
        }
        .bottom-sheet.open {
            display: block;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(18px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .sheet-header h3 {
            color: #b8cee7;
            font-weight: 450;
            font-size: 0.9rem;
        }
        .sheet-header .close-sheet {
            background: none;
            border: none;
            color: #7f97b5;
            font-size: 1.4rem;
            cursor: pointer;
        }
        .sheet-content {
            color: #e2edff;
            font-size: 0.95rem;
            word-break: break-all;
            background: #09101b;
            padding: 0.6rem 1rem;
            border-radius: 1.2rem;
            border: 1px solid #203040;
            font-family: monospace;
            max-height: 120px;
            overflow-y: auto;
        }
        .sheet-actions {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }
        .sheet-actions .btn {
            flex: 1;
            justify-content: center;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }
        .footer {
            margin-top: 1.4rem;
            text-align: center;
            font-size: 0.7rem;
            color: #5c738e;
        }
        .footer span {
            background: #121d2b;
            padding: 0.2rem 1rem;
            border-radius: 30px;
        }
        @media (max-width: 550px) {
            .scanner-card { padding: 0.8rem; }
            .header h1 { font-size: 1.2rem; }
            .status-bar { flex-direction: column; align-items: stretch; }
            #result-output { white-space: normal; }
            .action-group { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="scanner-card">
        <div class="header">
            <h1>📷 Scan <span>Pro</span></h1>
            <button class="btn-icon" id="flashBtn">🔦</button>
        </div>
        <div class="video-wrapper">
            <video id="video" playsinline autoplay muted></video>
            <div class="scan-overlay">
                <div class="scan-frame">
                    <div class="scan-line"></div>
                </div>
            </div>
        </div>
        <div class="status-bar">
            <div class="status-badge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Ready</span>
            </div>
            <div id="result-output">—</div>
        </div>
        <div class="action-group">
            <button class="btn btn-primary" id="startBtn">▶ Start</button>
            <button class="btn btn-secondary" id="pauseBtn">⏸ Pause</button>
            <button class="btn btn-secondary" id="clearBtn">✕ Clear</button>
        </div>
        <div class="bottom-sheet" id="bottomSheet">
            <div class="sheet-header">
                <h3>📋 Scanned Data</h3>
                <button class="close-sheet" id="closeSheetBtn">&times;</button>
            </div>
            <div class="sheet-content" id="sheetContent">—</div>
            <div class="sheet-actions">
                <button class="btn btn-success" id="copyBtn">📄 Copy</button>
                <button class="btn btn-primary" id="openLinkBtn">🔗 Open Link</button>
            </div>
        </div>
        <div class="footer"><span>🔍 real‑time · QR &amp; barcode</span></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const resultOutput = document.getElementById('result-output');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const clearBtn = document.getElementById('clearBtn');
        const flashBtn = document.getElementById('flashBtn');
        const bottomSheet = document.getElementById('bottomSheet');
        const sheetContent = document.getElementById('sheetContent');
        const closeSheetBtn = document.getElementById('closeSheetBtn');
        const copyBtn = document.getElementById('copyBtn');
        const openLinkBtn = document.getElementById('openLinkBtn');

        let codeReader = null;
        let stream = null;
        let isScanning = false;
        let isPaused = false;
        let lastDecodedText = '';
        let actionInProgress = false;
        let flashEnabled = false;
        let currentDecodedText = '';

        function setStatus(state, msg) {
            statusDot.className = 'status-dot';
            if (state === 'active') {
                statusDot.classList.add('active');
                statusText.textContent = msg || 'Scanning...';
            } else if (state === 'error') {
                statusDot.classList.add('error');
                statusText.textContent = msg || 'Error';
            } else {
                statusText.textContent = msg || 'Ready';
                statusDot.className = 'status-dot';
            }
        }

        function setResult(text) {
            if (!text) {
                resultOutput.textContent = '—';
                bottomSheet.classList.remove('open');
                currentDecodedText = '';
                return;
            }
            currentDecodedText = text;
            resultOutput.textContent = text;
            resultOutput.classList.add('highlight');
            sheetContent.textContent = text;
            bottomSheet.classList.add('open');
            setTimeout(() => {
                resultOutput.classList.remove('highlight');
            }, 6000);
        }

        function isValidUrl(string) {
            try {
                const url = new URL(string);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch (_) {
                return false;
            }
        }

        function processQRData(rawText) {
            if (!rawText || actionInProgress) return;
            if (rawText === lastDecodedText) return;
            lastDecodedText = rawText;
            setResult(rawText);
            setStatus('active', 'Code detected');
            const trimmed = rawText.trim();
            let url = '';
            if (isValidUrl(trimmed)) {
                url = trimmed;
            } else if (/^www\.[a-z0-9-]+\.[a-z]{2,}/i.test(trimmed)) {
                url = 'https://' + trimmed;
            } else if (/^[a-z0-9-]+\.[a-z]{2,}/i.test(trimmed) && !trimmed.includes(' ')) {
                url = 'https://' + trimmed;
            }
            if (url) {
                actionInProgress = true;
                setStatus('active', '🌐 Opening link...');
                try {
                    const win = window.open(url, '_blank');
                    if (!win || win.closed) window.location.href = url;
                } catch (e) {
                    setStatus('error', 'Navigation failed');
                }
                setTimeout(() => { actionInProgress = false; }, 1200);
            } else {
                setStatus('active', 'Text scanned');
            }
        }

        async function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            video.srcObject = null;
            isScanning = false;
            isPaused = false;
            if (codeReader) {
                try { await codeReader.reset(); } catch (_) {}
            }
            setStatus(null, 'Stopped');
            flashEnabled = false;
            flashBtn.classList.remove('flash-on');
            flashBtn.textContent = '🔦';
        }

        async function startScanner() {
            if (isScanning) {
                await stopCamera();
                await new Promise(r => setTimeout(r, 300));
            }
            try {
                setStatus(null, 'Initializing...');
                const constraints = {
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();
                if (!codeReader) {
                    codeReader = new ZXing.BrowserQRCodeReader();
                }
                isScanning = true;
                isPaused = false;
                lastDecodedText = '';
                setStatus('active', 'Scanning...');
                await codeReader.decodeFromVideoDevice(null, video, (result, error) => {
                    if (!isScanning || isPaused) return;
                    if (result && result.getText) {
                        const text = result.getText();
                        if (text && text !== lastDecodedText) {
                            processQRData(text);
                        }
                    }
                });
                setStatus('active', 'Scanning...');
            } catch (err) {
                console.error('Camera error:', err);
                setStatus('error', 'Camera unavailable');
                await stopCamera();
                setResult('⚠️ Camera error');
            }
        }

        function toggleFlash() {
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            if (!track) return;
            const capabilities = track.getCapabilities();
            if (!capabilities.torch) {
                setStatus('error', 'Flash not supported');
                setTimeout(() => { if (isScanning) setStatus('active', 'Scanning...'); }, 1500);
                return;
            }
            flashEnabled = !flashEnabled;
            track.applyConstraints({
                advanced: [{ torch: flashEnabled }]
            }).catch(() => {
                setStatus('error', 'Flash failed');
            });
            flashBtn.classList.toggle('flash-on', flashEnabled);
            flashBtn.textContent = flashEnabled ? '🔆' : '🔦';
        }

        function togglePause() {
            if (!isScanning) return;
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '▶ Resume' : '⏸ Pause';
            setStatus(isPaused ? null : 'active', isPaused ? 'Paused' : 'Scanning...');
            if (!isPaused) lastDecodedText = '';
        }

        function clearResult() {
            setResult(null);
            lastDecodedText = '';
            actionInProgress = false;
            bottomSheet.classList.remove('open');
            if (!isScanning) setStatus(null, 'Ready');
            else if (!isPaused) setStatus('active', 'Scanning...');
            else setStatus(null, 'Paused');
        }

        function closeSheet() {
            bottomSheet.classList.remove('open');
        }

        function copyResult() {
            if (!currentDecodedText) return;
            navigator.clipboard.writeText(currentDecodedText).then(() => {
                setStatus('active', 'Copied!');
                setTimeout(() => { if (isScanning) setStatus('active', 'Scanning...'); }, 1200);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = currentDecodedText;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                setStatus('active', 'Copied!');
                setTimeout(() => { if (isScanning) setStatus('active', 'Scanning...'); }, 1200);
            });
        }

        function openLink() {
            if (!currentDecodedText) return;
            let url = currentDecodedText.trim();
            if (!isValidUrl(url)) {
                if (/^www\.[a-z0-9-]+\.[a-z]{2,}/i.test(url)) {
                    url = 'https://' + url;
                } else if (/^[a-z0-9-]+\.[a-z]{2,}/i.test(url) && !url.includes(' ')) {
                    url = 'https://' + url;
                } else {
                    setStatus('error', 'Not a valid link');
                    return;
                }
            }
            if (isValidUrl(url)) {
                try {
                    const win = window.open(url, '_blank');
                    if (!win || win.closed) window.location.href = url;
                    closeSheet();
                } catch (e) {
                    setStatus('error', 'Cannot open link');
                }
            } else {
                setStatus('error', 'Invalid URL');
            }
        }

        startBtn.addEventListener('click', startScanner);
        pauseBtn.addEventListener('click', togglePause);
        clearBtn.addEventListener('click', clearResult);
        flashBtn.addEventListener('click', toggleFlash);
        closeSheetBtn.addEventListener('click', closeSheet);
        copyBtn.addEventListener('click', copyResult);
        openLinkBtn.addEventListener('click', openLink);

        window.addEventListener('beforeunload', async () => {
            if (codeReader) {
                try { await codeReader.reset(); } catch (_) {}
            }
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            video.srcObject = null;
        });

        setStatus(null, 'Ready');
        setResult(null);
        console.log('📷 QR/Barcode Scanner Pro · Ready');
    </script>
</body>
</html>
